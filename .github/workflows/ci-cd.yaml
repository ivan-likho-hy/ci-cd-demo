name: CI/CD Pipeline (GitOps)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ci-cd-demo
  CONFIG_REPO: k8s-studying
  KUSTOMIZE_PATH: sample-app/overlays/dev

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ github.sha }}
      full-image: ${{ steps.build.outputs.full-image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $FULL_IMAGE .
          docker push $FULL_IMAGE
          echo "full-image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Pushed: $FULL_IMAGE"

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.CONFIG_REPO }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: config-repo

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in Kustomize overlay
        env:
          FULL_IMAGE: ${{ needs.build-and-push.outputs.full-image }}
        run: |
          cd config-repo/$KUSTOMIZE_PATH
          kustomize edit set image nginx=$FULL_IMAGE

      - name: Commit and push
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd config-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update dev image to ${IMAGE_TAG:0:7}"
          git push
